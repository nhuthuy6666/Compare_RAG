{
  "dataset_path": "evaluation/dataset/testset.json",
  "outputs_dir": "evaluation/outputs",
  "results_dir": "evaluation/results",
  "request_timeout_seconds": 180,
  "connect_timeout_seconds": 10,
  "semantic": {
    "enabled": true,
    "base_url": "http://127.0.0.1:11434/v1",
    "model": "bge-m3:latest"
  },
  "baseline": {
    "name": "baseline",
    "base_url": "http://127.0.0.1:3001",
    "workspace_slug": "eval-clean-v2",
    "env_file": "extract_md/.env.anythingllm",
    "chat_endpoint": "/api/v1/workspace/{workspace_slug}/chat",
    "health_endpoint": "/api/ping",
    "mode": "chat"
  },
  "hybrid": {
    "name": "hybrid",
    "base_url": "http://127.0.0.1:8000",
    "health_endpoint": "/health",
    "chat_endpoint": "/api/chat"
  },
  "graphrag": {
    "name": "graphrag",
    "base_url": "http://127.0.0.1:8502",
    "health_endpoint": "/",
    "create_chat_endpoint": "/api/chats",
    "send_message_endpoint": "/api/chats/{session_id}/messages",
    "delete_chat_endpoint": "/api/chats/{session_id}"
  }
}
