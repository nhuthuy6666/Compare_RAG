<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NTU RAG Baseline</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5efe5;
      --paper: #fffaf2;
      --panel: rgba(255, 250, 242, 0.84);
      --panel-strong: #fff8ee;
      --border: rgba(105, 71, 32, 0.12);
      --text: #2f2417;
      --muted: #7e664b;
      --accent: #b85c38;
      --accent-strong: #9f4725;
      --accent-soft: rgba(184, 92, 56, 0.12);
      --user: #3f6f62;
      --shadow: 0 18px 50px rgba(111, 76, 36, 0.12);
      --radius-xl: 28px;
      --radius-md: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Be Vietnam Pro", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(184, 92, 56, 0.1), transparent 30%),
        radial-gradient(circle at bottom right, rgba(63, 111, 98, 0.12), transparent 35%),
        linear-gradient(180deg, #f8f2e8 0%, #efe5d7 100%);
    }

    .layout {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 320px 1fr;
    }

    .sidebar {
      padding: 28px 18px;
      border-right: 1px solid var(--border);
      background: rgba(255, 248, 238, 0.7);
      backdrop-filter: blur(14px);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .brand {
      padding: 8px 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 {
      margin: 18px 0 10px;
      font-family: "Fraunces", serif;
      font-size: 34px;
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .new-chat-btn {
      border: none;
      border-radius: 18px;
      padding: 14px 16px;
      background: linear-gradient(135deg, var(--accent) 0%, #cb7a53 100%);
      color: white;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(184, 92, 56, 0.24);
    }

    .history-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      font-weight: 700;
      padding: 0 10px;
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 4px;
    }

    .history-card {
      display: flex;
      align-items: stretch;
      border-radius: 16px;
      border: 1px solid transparent;
      transition: 0.2s ease;
      overflow: hidden;
    }

    .history-card.active {
      background: rgba(255, 255, 255, 0.58);
      border-color: rgba(184, 92, 56, 0.22);
      box-shadow: 0 10px 28px rgba(111, 76, 36, 0.08);
    }

    .history-main,
    .history-delete {
      border: none;
      background: none;
      font: inherit;
      color: inherit;
    }

    .history-main {
      flex: 1;
      text-align: left;
      padding: 12px 14px;
      cursor: pointer;
    }

    .history-main strong,
    .history-main span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-main strong {
      font-size: 13px;
      margin-bottom: 4px;
    }

    .history-main span,
    .history-delete {
      color: var(--muted);
      font-size: 12px;
    }

    .history-delete {
      width: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: color 0.2s ease, background 0.2s ease;
    }

    .history-delete:hover:not(:disabled) {
      color: #a93d27;
      background: rgba(169, 61, 39, 0.08);
    }

    .history-delete:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .main {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .topbar {
      padding: 28px 32px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .topbar h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }

    .topbar p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .pill {
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid var(--border);
      color: var(--accent-strong);
      font-size: 12px;
      font-weight: 700;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .empty {
      margin: auto;
      max-width: 620px;
      background: var(--panel);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 32px;
      box-shadow: var(--shadow);
      padding: 34px;
      text-align: center;
    }

    .empty h3 {
      margin: 0 0 10px;
      font-family: "Fraunces", serif;
      font-size: 28px;
    }

    .empty p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
    }

    .chips {
      margin-top: 22px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .chip {
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.72);
      color: var(--text);
      border-radius: 999px;
      padding: 9px 14px;
      font: inherit;
      cursor: pointer;
    }

    .message-row {
      display: flex;
      animation: fadeUp 0.2s ease both;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-box {
      width: min(760px, 86%);
      border-radius: var(--radius-xl);
      padding: 18px 18px 16px;
      box-shadow: var(--shadow);
      background: var(--panel);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.55);
    }

    .message-row.user .message-box {
      background: rgba(237, 249, 244, 0.82);
      border-color: rgba(63, 111, 98, 0.2);
    }

    .meta {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .message-row.user .meta {
      color: var(--user);
    }

    .content {
      white-space: pre-wrap;
      line-height: 1.75;
      font-size: 14.5px;
    }

    .typing {
      display: inline-flex;
      gap: 6px;
      align-items: center;
    }

    .typing span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.1s infinite ease-in-out;
      opacity: 0.55;
    }

    .typing span:nth-child(2) { animation-delay: 0.14s; }
    .typing span:nth-child(3) { animation-delay: 0.28s; }

    .composer {
      padding: 20px 24px 28px;
    }

    .composer-shell {
      background: var(--panel-strong);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 30px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .composer-box {
      display: flex;
      align-items: flex-end;
      gap: 12px;
    }

    textarea {
      width: 100%;
      min-height: 30px;
      max-height: 180px;
      resize: none;
      border: none;
      background: transparent;
      outline: none;
      font: inherit;
      font-size: 15px;
      color: var(--text);
      line-height: 1.7;
    }

    textarea::placeholder {
      color: var(--muted);
    }

    .send-btn {
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent) 0%, #d17b53 100%);
      color: white;
      cursor: pointer;
      font-size: 18px;
      box-shadow: 0 12px 24px rgba(184, 92, 56, 0.26);
    }

    .send-btn:disabled,
    .new-chat-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .composer-meta {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      color: var(--muted);
      font-size: 12px;
    }

    .status.error {
      color: #a93d27;
    }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.45; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 960px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }

    @media (max-width: 640px) {
      .topbar,
      .messages,
      .composer {
        padding-left: 16px;
        padding-right: 16px;
      }
      .message-box {
        width: 100%;
      }
      .composer-meta {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="badge">Baseline RAG</div>
        <h1>NTU<br>Admissions Desk</h1>
        <p>Phiên bản dense-retrieval thuần để so sánh công bằng với hybrid và GraphRAG.</p>
      </div>

      <button id="newChatBtn" class="new-chat-btn" type="button">Cuộc trò chuyện mới</button>

      <div class="history-title">Lịch sử cục bộ</div>
      <div id="historyList" class="history-list"></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2 id="chatTitle">Cuộc trò chuyện mới</h2>
          <p>Dense retrieval · Qdrant · LlamaIndex · llama3.1:8b</p>
        </div>
        <div class="pill">RAG</div>
      </header>

      <section id="messages" class="messages"></section>

      <footer class="composer">
        <div class="composer-shell">
          <div class="composer-box">
            <textarea id="messageInput" rows="1" placeholder="Hỏi về điểm chuẩn, học phí, mã trường, phương thức tuyển sinh..."></textarea>
            <button id="sendBtn" class="send-btn" type="button" aria-label="Gửi">↑</button>
          </div>
          <div class="composer-meta">
            <div id="statusLine" class="status"></div>
            <div>Enter để gửi · Shift + Enter để xuống dòng</div>
          </div>
        </div>
      </footer>
    </main>
  </div>

  <script>
    const STORAGE_KEY = "ntu_rag_chat_sessions";
    const ACTIVE_KEY = "ntu_rag_active_session";

    const historyList = document.getElementById("historyList");
    const messagesEl = document.getElementById("messages");
    const titleEl = document.getElementById("chatTitle");
    const inputEl = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const statusLine = document.getElementById("statusLine");
    const newChatBtn = document.getElementById("newChatBtn");

    let sessions = loadSessions();
    let activeSessionId = loadActiveSessionId();
    let isSending = false;

    if (!sessions.length) sessions = [createSession()];
    if (!sessions.some((s) => s.id === activeSessionId)) activeSessionId = sessions[0].id;

    persistState();
    render();

    newChatBtn.addEventListener("click", () => {
      const session = createSession();
      sessions.unshift(session);
      activeSessionId = session.id;
      persistState();
      render();
      inputEl.focus();
    });

    sendBtn.addEventListener("click", () => void handleSend());
    inputEl.addEventListener("input", autoResize);
    inputEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        void handleSend();
      }
    });

    autoResize();

    function createSession() {
      return { id: generateId(), title: "Cuộc trò chuyện mới", messages: [] };
    }

    function generateId() {
      return window.crypto?.randomUUID?.() ?? "s-" + Date.now() + "-" + Math.random().toString(16).slice(2);
    }

    function loadSessions() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function loadActiveSessionId() {
      return localStorage.getItem(ACTIVE_KEY);
    }

    function persistState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
      localStorage.setItem(ACTIVE_KEY, activeSessionId);
    }

    function getActiveSession() {
      return sessions.find((session) => session.id === activeSessionId) || sessions[0];
    }

    function updateSessionTitle(session) {
      const firstUser = session.messages.find((message) => message.role === "user");
      if (!firstUser) {
        session.title = "Cuộc trò chuyện mới";
        return;
      }
      const text = firstUser.content.replace(/\s+/g, " ").trim();
      session.title = text.length > 46 ? text.slice(0, 46) + "…" : text;
    }

    function deleteSession(id) {
      sessions = sessions.filter((session) => session.id !== id);
      if (!sessions.length) sessions = [createSession()];
      if (!sessions.some((session) => session.id === activeSessionId)) activeSessionId = sessions[0].id;
      persistState();
      render();
    }

    function selectSession(id) {
      activeSessionId = id;
      persistState();
      render();
    }

    function render() {
      renderSidebar();
      renderMessages();
      titleEl.textContent = getActiveSession().title;
      autoResize();
    }

    function renderSidebar() {
      historyList.innerHTML = "";
      sessions.forEach((session) => {
        const card = document.createElement("div");
        card.className = "history-card" + (session.id === activeSessionId ? " active" : "");

        const main = document.createElement("button");
        main.type = "button";
        main.className = "history-main";
        main.disabled = isSending;
        const last = session.messages[session.messages.length - 1];
        main.innerHTML = "<strong></strong><span></span>";
        main.querySelector("strong").textContent = session.title;
        main.querySelector("span").textContent = last
          ? last.content.replace(/\s+/g, " ").trim() || "Tiếp tục hội thoại"
          : "Chưa có tin nhắn";
        main.addEventListener("click", () => selectSession(session.id));

        const remove = document.createElement("button");
        remove.type = "button";
        remove.className = "history-delete";
        remove.title = "Xóa cuộc trò chuyện";
        remove.setAttribute("aria-label", "Xóa cuộc trò chuyện");
        remove.textContent = "✕";
        remove.disabled = isSending;
        remove.addEventListener("click", () => deleteSession(session.id));

        card.appendChild(main);
        card.appendChild(remove);
        historyList.appendChild(card);
      });
    }

    function renderMessages() {
      const session = getActiveSession();
      messagesEl.innerHTML = "";

      if (!session.messages.length) {
        messagesEl.innerHTML = `
          <div class="empty">
            <h3>Baseline RAG sẵn sàng</h3>
            <p>Hệ này dùng dense retrieval thuần để làm mốc so sánh. Bạn có thể hỏi trực tiếp về tuyển sinh NTU và nhận câu trả lời ngắn gọn, đi thẳng vào nội dung.</p>
            <div class="chips">
              <button class="chip" onclick="fillInput(this)">Mã trường Đại học Nha Trang là gì?</button>
              <button class="chip" onclick="fillInput(this)">Điện thoại tuyển sinh là số nào?</button>
              <button class="chip" onclick="fillInput(this)">Ngành CNTT năm 2025 lấy bao nhiêu chỉ tiêu?</button>
            </div>
          </div>
        `;
        return;
      }

      session.messages.forEach((message) => {
        const row = document.createElement("div");
        row.className = "message-row " + message.role;

        const box = document.createElement("div");
        box.className = "message-box";

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = message.role === "user" ? "Bạn" : "RAG baseline";

        const content = document.createElement("div");
        content.className = "content";

        if (message.loading) {
          content.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
        } else {
          content.textContent = message.content;
        }

        box.appendChild(meta);
        box.appendChild(content);

        row.appendChild(box);
        messagesEl.appendChild(row);
      });

      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function handleSend() {
      if (isSending) return;
      const query = inputEl.value.trim();
      if (!query) return;

      const session = getActiveSession();
      session.messages.push({ role: "user", content: query });
      const pending = { role: "assistant", content: "", loading: true, sources: [] };
      session.messages.push(pending);
      updateSessionTitle(session);
      persistState();
      render();

      setComposerState(true);
      inputEl.value = "";
      autoResize();
      setStatus("Đang truy xuất dense index trong Qdrant...");

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query })
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "Không thể xử lý câu hỏi.");
        pending.loading = false;
        pending.content = payload.answer;
        pending.sources = payload.sources || [];
        setStatus("Đã hoàn tất.");
      } catch (error) {
        pending.loading = false;
        pending.content = error.message || "Đã xảy ra lỗi.";
        pending.sources = [];
        setStatus(pending.content, true);
      } finally {
        persistState();
        render();
        setComposerState(false);
        inputEl.focus();
      }
    }

    function setComposerState(disabled) {
      isSending = disabled;
      sendBtn.disabled = disabled;
      inputEl.disabled = disabled;
      newChatBtn.disabled = disabled;
    }

    function setStatus(message, isError = false) {
      statusLine.textContent = message;
      statusLine.className = "status" + (isError ? " error" : "");
    }

    function autoResize() {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + "px";
    }

    function fillInput(button) {
      inputEl.value = button.textContent;
      autoResize();
      inputEl.focus();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }
  </script>
</body>
</html>
